    <main id="content">
        <h1>Formulär</h1>
        <p>Formulär används för kommentarsfält och kontaktformulär på RAD:s webbplattformar.</p>
<form action="url">
    <fieldset>
        <legend> Kontakta oss </legend>
        <div class="form-row">
            <label for="name">Namn</label>
            <input type="text" id="name" name="name" placeholder="Namn">
        </div>
        <div class="form-row">
            <label for="email">E-post</label>
            <input type="email" id="email" name="email" placeholder="namn@exempel.se">
        </div>
        <div class="form-row">
            <label for="topic">Ämne</label>
            <select id="topic" name="topic">
                <option value="">Välj ett ämne</option>
                <option value="support">Support</option>
                <option value="feedback">Feedback</option>
                <option value="collaboration">Samarbete</option>
            </select>
        </div>
        <div class="form-row">
            <label>Prioritet</label>
            <div class="radio-group">
                <label><input type="radio" name="priority" value="low"> Låg</label>
                <label><input type="radio" name="priority" value="normal"> Normal</label>
                <label><input type="radio" name="priority" value="high"> Hög</label>
            </div>
        </div>
        <div class="form-row">
            <label>Nyhetsbrev</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="newsletter" name="newsletter"> Ja tack, skicka nyheter</label>
                <label><input type="checkbox" id="newsletter" name="newsletter"> Ja tack, skicka nyheter</label>
            </div>
        </div>
        <div class="form-row">
            <label for="message">Meddelande</label>
            <textarea id="message" name="message" rows="5" placeholder="Skriv ditt meddelande här..."></textarea>
        </div>
        <div class="form-row">
            <label for="file">Bilaga</label>
            <input type="file" id="file" name="file">
        </div>
        <div class="form-actions">
            <input type="submit" class="button positive-btn" value="Skicka">
            <button type="reset" class="button neutral-btn">Rensa</button>
        </div>
    </fieldset>
</form>
    </main>
    <footer>
        <p>Skapad av <a href="https://www.linkedin.com/in/sara-nilsson-774402220/" target="_blank">Sara Nilsson</a>.</p>
    </footer>
    <script src="/script.js"></script>
</body>
